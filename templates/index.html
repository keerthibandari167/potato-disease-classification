<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Disease Classification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
    background: linear-gradient(
        rgba(255,255,255,0.6),
        rgba(255,255,255,0.6)
    ),
    url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
        .card {
            background: rgba(230, 230, 250, 0.95);
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        h1 {
            color: #4a148c;
            font-weight: bold;
            margin-bottom: 20px;
        }
        img {
            border-radius: 10px;
            max-width: 100%;
            height: auto;
            margin-top: 15px;
            border: 5px solid #4a148c;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            font-weight: bold;
        }
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(to right, #4a148c, #6a1b9a);
            border: none;
        }
    </style>
</head>
<body>
    <div class="card text-center">
        <h1>Potato Disease Classification</h1>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/predict" enctype="multipart/form-data" class="mb-4">
            <input type="file" name="file" class="form-control mb-3" required>
            <button type="submit" class="btn btn-primary btn-lg">Predict</button>
        </form>
        {% if filename %}
        <div>
            <h5>Uploaded Image:</h5>
            <img src="{{ url_for('static', filename='uploads/' + filename) }}" alt="Uploaded Image">
        </div>
        {% endif %}
        {% if predicted_class %}
        <div class="alert alert-success mt-3">
            <h4>Prediction: {{ predicted_class }}</h4>
            <p>Confidence: {{ confidence }}</p>
        </div>
        {% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
